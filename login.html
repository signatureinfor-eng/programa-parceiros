<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mères | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.0.3">
</head>
<body class="login-container centered-layout">
    <main class="login-card">
        <div class="login-logo">
            <h1 style="font-size: 32px; font-weight: 800; color: var(--primary-color);">Mères</h1>
            <p style="color: var(--text-muted); margin-top: 8px;">Sistema de Parceiros</p>
        </div>

        <div id="loginError" class="error-message hidden"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com.br" required>
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit" id="loginBtn" style="margin-top: 24px;" onclick="console.log('FLASH EVENT: Direct HTML onclick');">
                Entrar no Sistema
            </button>
        </form>

        <footer style="margin-top: 40px; text-align: center;">
            <p style="font-size: 12px; color: var(--text-muted);">© 2024 Mères. Todos os direitos reservados.</p>
        </footer>
    </main>

    <script src="app.js?v=1.0.3"></script>
</body>
</html>
